<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AusClear CAPTCHA Demo</title>
<style>
  body { background: #07070a; color: #ebe6d6; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 40px 20px; }
  .demo { max-width: 480px; width: 100%; background: #14141a; border: 1px solid rgba(201,168,76,0.16); border-radius: 16px; padding: 40px; }
  h1 { font-family: 'Fraunces', Georgia, serif; font-weight: 500; font-size: 28px; margin: 0 0 8px; }
  h1 em { color: #c9a84c; font-style: italic; }
  p { color: #a8a8b4; line-height: 1.5; margin: 0 0 24px; font-size: 14px; }
  .token-out { margin-top: 24px; padding: 14px; background: #0d0d12; border: 1px solid rgba(201,168,76,0.16); border-radius: 8px; font-family: monospace; font-size: 11px; color: #6ec98a; word-break: break-all; min-height: 18px; }
  .reset-btn { margin-top: 14px; padding: 10px 18px; background: transparent; color: #d9bf6f; border: 1px solid rgba(201,168,76,0.32); border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; }
  .reset-btn:hover { background: rgba(201,168,76,0.08); }
</style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fraunces:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
</head>
<body>

<div class="demo">
  <h1>AusClear <em>CAPTCHA</em> Demo</h1>
  <p>Drag the puzzle piece (or use the gold slider below) until the piece fits into the gap. Watch the developer console for trajectory data.</p>

  <div id="captcha"></div>

  <div class="token-out" id="token">Token: (none)</div>
  <button class="reset-btn" id="reset">Reset Challenge</button>
</div>

<script src="/widget.js"></script>
<script>
  const widget = AusclearCaptcha.mount('#captcha', {
    onSuccess: (token) => {
      document.getElementById('token').textContent = 'Token: ' + token;
    },
    onFail: (msg) => {
      document.getElementById('token').textContent = 'Failed: ' + msg;
    }
  });
  document.getElementById('reset').addEventListener('click', () => widget.reset());
</script>

</body>
</html>
